<div class="container">
  <h1>Pokemon TCG Price Tracker</h1>

  <div class="search-bar">
    <input
      type="text"
      placeholder="Search for a Pokemon card..."
      [(ngModel)]="searchQuery"
      (keyup.enter)="search()"
    />
    <button (click)="search()">Search</button>
  </div>

  <p *ngIf="loading()">Searching...</p>
  <p *ngIf="error()">{{ error() }}</p>

  <div class="card-grid">
    <div class="card" *ngFor="let card of cards()">
      <img *ngIf="card.image" [src]="card.image" [alt]="card.name" />
      <div class="card-info">
        <h2>{{ card.name }}</h2>
        <p>{{ card.rarity }} - {{ card.supertype }}</p>
        <p *ngIf="card.hp">HP: {{ card.hp }}</p>
        <p *ngIf="card.episodeName">Set: {{ card.episodeName }} ({{ card.episodeCode }})</p>
        <p *ngIf="card.artist">Artist: {{ card.artist }}</p>
        <p *ngIf="card.currentPrice" class="price">
          {{ card.currentPrice }} {{ card.priceCurrency }}
        </p>
      </div>
    </div>
  </div>
</div>
